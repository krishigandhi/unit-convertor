<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Unit Converter</title>
  <link rel="stylesheet" href="style
  .css" />
</head>
<body>

  <div class="container">
    
    <div class="top">
      <h1>Metric / Imperial Unit Conversion</h1>

      <!-- No default value -->
      <input id="input" type="number" placeholder="0" class="input-box" />

      <button id="buttonClick">Convert</button>
    </div>

    <div class="bottom">

      <div  class="card">
        <h2>Length (Meter/Feet)</h2>
        <p id="card1">0 meters = 0 feet | 0 feet = 0 meters</p>
      </div>

      <div class="card">
        <h2>Volume (Liters/Gallons)</h2>
        <p  id="card2">0 liters = 0 gallons | 0 gallons = 0 liters</p>
      </div>

      <div  class="card">
        <h2>Mass (Kilograms/Pounds)</h2>
        <p id="card3">0 kilos = 0 pounds | 0 pounds = 0 kilos</p>
      </div>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
